<mat-toolbar>
  <a class="brand" routerLink="/">Brett Pasula</a>
  <span class="spacer"></span>
  @if (showNavigation()) {
    @if (useNavButtons()) {
      <nav-buttons></nav-buttons>
    } @else {
      <nav-menu></nav-menu>
    }
  }
  <button
    mat-icon-button
    (click)="themeService.toggle()"
    [attr.aria-label]="
      themeService.theme() === 'dark'
        ? 'Switch to light mode'
        : 'Switch to dark mode'
    "
  >
    <mat-icon>{{
      themeService.theme() === "dark" ? "light_mode" : "dark_mode"
    }}</mat-icon>
  </button>
</mat-toolbar>
